version: '3.8'

services:
  storage-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    image: nimbusfs-storage-node:latest
    entrypoint: ["/usr/local/bin/storage_node"]
    ports:
      - "50051:50051"
    volumes:
      - nimbus_data_1:/var/lib/nimbusfs/data
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=localhost:50051"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  nimbus_data_1:
